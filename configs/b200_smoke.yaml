name: b200-smoke-fixed-h

model:
  name_or_path: Qwen/Qwen2.5-0.5B
  seq_len: 512
  dtype: bf16

dataset:
  name: roneneldan/TinyStories
  split: train
  text_column: text
  streaming: true
  shuffle_seed: 17
  domain_name: general

learners:
  count: 8
  min_ready: 8
  gpus_per_learner: 1
  per_device_batch_size: 1
  learning_rate: 2.0e-5
  weight_decay: 0.1
  max_grad_norm: 1.0

policy:
  name: fixed_h
  fixed_h: 32
  min_h: 32
  max_h: 128

merge:
  token_weighted: true
  staleness_half_life_sec: 1800
  max_update_norm: null

runtime:
  workspace: workspaces/b200-smoke-fixed-h
  max_global_rounds: 3
  max_control_cycles: 8
  report_timeout_sec: 1800
  poll_interval_sec: 2

tags:
  platform: b200
  accelerator: b200
  mode: smoke

